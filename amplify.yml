version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/townofwiley-app/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    # Security headers applied to all responses (Amplify Hosting). If the same paths also have
    # custom headers in the Amplify Console, reconcile them so production does not drift from this file.
    # PrimeIcons (pi pi-*) load embedded icomoon fonts via data: URLs — font-src must include `data:`.
    - pattern: '**/*'
      headers:
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-XSS-Protection'
          value: '1; mode=block'
        - key: 'Referrer-Policy'
          value: 'strict-origin-when-cross-origin'
        - key: 'Permissions-Policy'
          value: 'camera=(), microphone=(), geolocation=(), payment=()'
        - key: 'Content-Security-Policy'
          value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://bots.easy-peasy.ai; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.appsync-api.us-east-2.amazonaws.com wss://*.appsync-realtime-api.us-east-2.amazonaws.com https://cognito-idp.us-east-2.amazonaws.com https://cognito-identity.us-east-2.amazonaws.com https://cognito-sync.us-east-2.amazonaws.com https://townofwiley-documents-storage.s3.us-east-2.amazonaws.com https://api.weather.gov https://alerts.weather.gov https://radar.weather.gov https://*.lambda-url.us-east-2.on.aws https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://analytics.google.com https://bots.easy-peasy.ai wss://bots.easy-peasy.ai; font-src 'self' data:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
    # Immutable cache for fingerprinted JS/CSS bundles (Angular outputHashing: all)
    - pattern: '**/*.js'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.css'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    # Long cache for fonts (versioned by npm at build time)
    - pattern: '**/*.woff'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.woff2'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    # Medium cache for images
    - pattern: '**/*.webp'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=2592000'
    - pattern: '**/*.png'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=2592000'
    - pattern: '**/*.gif'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=2592000'
    # No-cache for HTML entry points (prerendered pages must always be fresh)
    - pattern: '**/*.html'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
    # No-cache for runtime config (injected per environment)
    - pattern: '**/runtime-config.js'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
