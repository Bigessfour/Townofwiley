# Hosting HTTP headers (CSP, HSTS, cache-control) live in repo-root customHttp.yml only.
# See https://docs.aws.amazon.com/amplify/latest/userguide/migrate-custom-headers.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/townofwiley-app/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
