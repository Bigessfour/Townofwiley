<section class="records-center grid gap-6" aria-labelledby="records-center-heading">
  <p class="meta-label">{{ copy().kicker }}</p>
  <h1 id="records-center-heading">{{ copy().title }}</h1>

  <section class="records-center-grid" aria-label="Records and document guides">
    @for (guide of copy().guides; track guide.id) {
      <section
        class="records-guide-card"
        [attr.id]="guide.id"
        [attr.data-testid]="guide.id"
        aria-labelledby="guide-{{ guide.id }}"
      >
        <i [class]="guide.icon" aria-hidden="true"></i>
        <p class="meta-label">{{ guide.kicker }}</p>
        <h2 id="guide-{{ guide.id }}">{{ guide.title }}</h2>
        <p>{{ guide.detail }}</p>

        @if (resolveAppLink(guide.href); as guideLink) {
          @if (guideLink.isInternal) {
            <a
              class="records-guide-link"
              [routerLink]="guideLink.path"
              [fragment]="guideLink.fragment"
            >
              {{ guide.cta }}
            </a>
          } @else {
            <a class="records-guide-link" [attr.href]="guideLink.href">
              {{ guide.cta }}
            </a>
          }
        }
      </section>
    }
  </section>
</section>
