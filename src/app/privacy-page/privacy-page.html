<section class="feature-detail-stack">
  <p-card class="panel" id="privacy">
    <p class="section-kicker">{{ copy().kicker }}</p>
    <h1>{{ copy().title }}</h1>
    <p class="feature-hub-copy">{{ copy().intro }}</p>
    <div class="stack-list">
      @for (item of copy().items; track item.title) {
        <article class="info-row">
          <strong>{{ item.title }}</strong>
          <span>{{ item.detail }}</span>
        </article>
      }
    </div>
  </p-card>
</section>
