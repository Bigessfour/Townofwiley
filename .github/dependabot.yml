version: 2
updates:
  # npm dependencies (Angular app)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Denver
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-eslint/*"
      primeng:
        patterns:
          - "primeng"
          - "primeicons"
      aws-amplify:
        patterns:
          - "aws-amplify"
          - "@aws-amplify/*"
      testing:
        patterns:
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
          - "axe-core"
    ignore:
      # Suppress patch bumps for major framework packages to reduce noise;
      # still get minor/major alerts for security.
      - dependency-name: "@angular/*"
        update-types:
          - version-update:semver-patch
    labels:
      - "dependencies"
      - "automated"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Denver
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
