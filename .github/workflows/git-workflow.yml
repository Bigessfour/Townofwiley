name: Site CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: site-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
  NG_CLI_ANALYTICS: 'false'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.classify.outputs.app_changed }}
      e2e_changed: ${{ steps.classify.outputs.e2e_changed }}
      site_proxy_changed: ${{ steps.classify.outputs.site_proxy_changed }}
      weather_alerts_changed: ${{ steps.classify.outputs.weather_alerts_changed }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      changed_files: ${{ steps.classify.outputs.changed_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify paths
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t FILES < <(git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}")
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t FILES < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          else
            mapfile -t FILES < <(git diff --name-only "${{ github.event.before }}...${{ github.sha }}")
          fi

          APP_CHANGED=false
          E2E_CHANGED=false
          SITE_PROXY_CHANGED=false
          WEATHER_ALERTS_CHANGED=false
          DOCS_ONLY=true

          for FILE in "${FILES[@]}"; do
            [[ -z "$FILE" ]] && continue

            case "$FILE" in
              src/*|public/*|package.json|package-lock.json|angular.json|amplify.yml|playwright.config.ts|tsconfig*.json|eslint.config.js|scripts/generate-runtime-config.mjs)
                APP_CHANGED=true
                DOCS_ONLY=false
                ;;
              e2e/*)
                E2E_CHANGED=true
                DOCS_ONLY=false
                ;;
              infrastructure/nws-weather-proxy/*|infrastructure/paystar-proxy/*)
                SITE_PROXY_CHANGED=true
                DOCS_ONLY=false
                ;;
              infrastructure/severe-weather-signup/*)
                WEATHER_ALERTS_CHANGED=true
                DOCS_ONLY=false
                ;;
              docs/*|README.md|CLERK-CMS-GUIDE.md|bot-training/*|infrastructure/email-alias-router/*|scripts/deploy-email-alias-router.py|scripts/deploy-severe-weather-backend.py|scripts/user-secrets.mjs)
                ;;
              *)
                DOCS_ONLY=false
                ;;
            esac
          done

          {
            echo "app_changed=$APP_CHANGED"
            echo "e2e_changed=$E2E_CHANGED"
            echo "site_proxy_changed=$SITE_PROXY_CHANGED"
            echo "weather_alerts_changed=$WEATHER_ALERTS_CHANGED"
            echo "docs_only=$DOCS_ONLY"
            echo "changed_files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Change Classification

          - Deployable site files changed: ${{ steps.classify.outputs.app_changed }}
          - End-to-end validation files changed: ${{ steps.classify.outputs.e2e_changed }}
          - Website runtime proxy code changed: ${{ steps.classify.outputs.site_proxy_changed }}
          - Severe weather signup backend changed: ${{ steps.classify.outputs.weather_alerts_changed }}
          - Docs or maintainer-only change set: ${{ steps.classify.outputs.docs_only }}

          ### Changed Files

          ```text
          ${{ steps.classify.outputs.changed_files }}
          ```
          EOF

  frontend-lint-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true' || needs.detect-changes.outputs.e2e_changed == 'true'
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore Angular CLI cache
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-cache-${{ hashFiles('package-lock.json', 'angular.json', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-cache-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  frontend-smoke:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true' || needs.detect-changes.outputs.e2e_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24 (deterministic)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deterministic E2E regression suite
        run: npx playwright test --project=desktop-chromium
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-and-video
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  site-runtime-proxy-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.site_proxy_changed == 'true'
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run public-site proxy tests
        run: npm run test:infra

  weather-alert-backend-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.weather_alerts_changed == 'true'
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run severe weather backend tests
        run: npm run test:infra:alerts

  maintainer-only-summary:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only == 'true'
    steps:
      - name: Mark maintainer-only change set
        run: echo "Maintainer-only changes detected. Frontend regression checks were intentionally skipped."
