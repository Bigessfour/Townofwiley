      { allow: public, provider: apiKey, operations: [read] }
      { allow: private, provider: identityPool, operations: [read, create, update, delete] }
      { allow: private, provider: userPools, operations: [read, create, update, delete] }
    ]
  ) {
  id: ID!
  enabled: Boolean!
  label: String!
  title: String!
  detail: String!
  linkLabel: String
  linkHref: AWSURL
}

