type SiteSettings
  @model
  @auth(
    rules: [
      { allow: public, provider: apiKey, operations: [read] }
      { allow: private, provider: identityPool, operations: [read, create, update, delete] }
      { allow: private, provider: userPools, operations: [read, create, update, delete] }
    ]
  ) {
  id: ID!
  townName: String!
  officeHours: String
  address: String
  phone: AWSPhone
  email: AWSEmail
  pageTitle: String
  heroEyebrow: String
  heroStatus: String
  heroTitle: String
  heroMessage: String
  heroSubtext: String
  welcomeLabel: String
  welcomeHeading: String
  welcomeBody: String
  welcomeCaption: String
}

