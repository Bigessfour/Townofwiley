type EmailAlias
  @model
  @auth(
    rules: [
      { allow: private, provider: identityPool, operations: [read, create, update, delete] }
      { allow: private, provider: userPools, operations: [read, create, update, delete] }
    ]
  ) {
  id: ID!
  aliasAddress: AWSEmail! @index(name: "byAliasAddress", queryField: "emailAliasByAddress")
  destinationAddress: AWSEmail!
  displayName: String
  roleLabel: String
  active: Boolean!
  notes: String
}
