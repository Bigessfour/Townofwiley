# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
lint:
  enabled:
    - taplo@0.10.0
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.3.1
    - eslint@10.2.1
    - isort@8.0.1
    - oxipng@10.1.1
    - ruff@0.15.12
    - checkov@3.2.525
    - git-diff-check
    - markdownlint@0.48.0
    - osv-scanner@2.3.5
    - prettier@3.8.3
    - svgo@4.0.1
    - trufflehog@3.95.2
    - yamllint@1.38.0
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
