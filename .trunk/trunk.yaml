# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@24.0.0 # Matches project engines and .nvmrc preference
    - python@3.14.4
lint:
  enabled:
    - eslint@10.2.1
    - prettier@3.8.3
    - markdownlint@0.48.0
    - git-diff-check
    - osv-scanner@2.3.5
    - trufflehog@3.95.2
    # Security & quality (Angular/Python heavy project)
    - grype@0.111.1
    - checkov@3.2.526
    - bandit@1.9.4
    - ruff@0.15.12
    # Additional useful linters
    - taplo@0.10.0
    - yamllint@1.38.0
    - svgo@4.0.1
    - oxipng@10.1.1
actions:
  disabled:
    - trunk-announce
    # trunk-fmt-pre-commit intentionally disabled (we prefer editor formatOnSave + manual trunk fmt)
  enabled:
    - trunk-upgrade-available
    - trunk-check-pre-push # ← Enables pre-push hook (formats + runs checks before push to GitHub)


# Pre-push configuration - runs on `git push`
# This will run `trunk fmt --fix` (if safe) followed by `trunk check` before allowing the push.
# Failures will block the push, protecting main and PRs.
